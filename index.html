<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/icon" href="img/favicon.ico" />
  <meta property="og:title" content="Currency Converter" />
  <meta property="og:description" content="Get real-time currency conversion rates." />
  <meta property="og:image" content="img/preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hugelevin.github.io/currencyconverter/" />

  <link rel="preconnect" href="https://wise.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <main>
    <fieldset class="container">
      <legend class="visually-hidden">Widget view</legend>

      <input class="widget-toggle" type="radio" name="widget-view" id="view-chart" />
      <input class="widget-toggle" type="radio" name="widget-view" id="view-converter" checked />
      <input class="widget-toggle" type="radio" name="widget-view" id="view-table" />

      <div class="widget-type">
        <div class="widget-tabs">
          <label class="widget-tab" for="view-chart" title="Chart">
            <span class="widget-icon widget-icon--chart" aria-hidden="true"></span>
            <span class="visually-hidden">Chart</span>
          </label>
          <label class="widget-tab widget-tab--primary" for="view-converter" title="Converter">
            <span class="widget-icon widget-icon--converter" aria-hidden="true"></span>
            <span class="visually-hidden">Converter</span>
          </label>
          <label class="widget-tab" for="view-table" title="Table">
            <span class="widget-icon widget-icon--table" aria-hidden="true"></span>
            <span class="visually-hidden">Table</span>
          </label>
        </div>
      </div>

      <div class="widget-frame">
        <section class="widget-view widget-view--converter" aria-label="Currency converter">
          <iframe
            title="Converter"
            src="https://wise.com/gb/currency-converter/fx-widget/converter?sourceCurrency=TRY&amp;targetCurrency=EUR&amp;amount=1000"
            width="321"
            height="300"
            frameborder="0"
            allowtransparency="true"
            scrolling="no"
          ></iframe>
        </section>

        <section class="widget-view widget-view--chart" aria-label="Exchange-rate chart">
          <iframe
            title="Chart"
            src="https://wise.com/gb/currency-converter/fx-widget/chart?sourceCurrency=TRY&amp;targetCurrency=EUR"
            width="440"
            height="520"
            frameborder="0"
            allowtransparency="true"
            scrolling="no"
          ></iframe>
        </section>

        <section class="widget-view widget-view--table" aria-label="Exchange-rate table">
          <iframe
            title="Table"
            src="https://wise.com/gb/currency-converter/fx-widget/table?sourceCurrency=EUR&amp;targetCurrencies=USD%2CEUR%2CJPY%2CGBP%2CCNY%2CCHF%2CAUD%2CCAD%2CINR"
            width="380"
            height="800"
            frameborder="0"
            allowtransparency="true"
            scrolling="no"
          ></iframe>
        </section>
      </div>
    </fieldset>
  </main>
</body>
</html>
